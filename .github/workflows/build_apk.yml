name: Build Release APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source ─────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Java (required by Gradle / Android SDK) ──────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Set up Flutter ───────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'   # pin to a stable version you use locally
          channel: stable
          cache: true

      # ── 4. Verify Flutter & Dart versions ───────────────────────
      - name: Flutter version info
        run: flutter --version

      # ── 5. Install dependencies  ← THIS IS WHAT WAS MISSING ────
      - name: Install Flutter dependencies
        run: flutter pub get

      # ── 6. (Optional) Run tests before building ─────────────────
      # - name: Run tests
      #   run: flutter test

      # ── 7. Decode keystore from secret (for signed release APK) ─
      #       Skip this block if you don't sign yet — the APK will
      #       still build as unsigned.
      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.jks

      # ── 8. Create key.properties so Gradle can find the keystore ─
      - name: Write key.properties
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.jks
          EOF

      # ── 9. Build release APK ────────────────────────────────────
      - name: Build Release APK
        run: flutter build apk --release --no-pub

      # ── 10. Upload APK as workflow artifact ─────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-rabai-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
